services:
  - type: web
    name: ai-billing-dispute-backend
    env: node
    region: oregon
    plan: free
    
    buildCommand: |
      npm install --prefix frontend
      npm run build --prefix frontend
      npm install --prefix backend
    
    startCommand: npm start --prefix backend
    
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        fromDatabase: true
      - key: OPENAI_API_KEY
        fromDatabase: true
